<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>言い方バトル 🔥</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple: #6c63ff; --dark: #1e1b4b; --bg: #f0eeff; }
    body { font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans',-apple-system,Meiryo,sans-serif; background: var(--bg); min-height: 100vh; color: #1a1a2e; }

    /* Header */
    .header { background: linear-gradient(135deg,#1e1b4b,#4338ca); color: white; padding: 13px 18px 11px; position: sticky; top:0; z-index:100; box-shadow: 0 2px 16px rgba(30,27,75,.4); }
    .header-row { display:flex; align-items:center; justify-content:space-between; }
    .header h1 { font-size:17px; font-weight:800; }
    .room-badge { font-size:12px; font-weight:700; background:rgba(255,255,255,.2); border-radius:8px; padding:3px 10px; letter-spacing:.06em; display:none; }
    .prog-wrap { margin-top:7px; background:rgba(255,255,255,.22); border-radius:100px; height:5px; display:none; }
    .prog-bar { height:100%; background:white; border-radius:100px; transition:width .5s ease; }

    .main { max-width:660px; margin:0 auto; padding:18px 14px 60px; }
    .screen { display:none; }
    .screen.active { display:block; }
    .card { background:white; border-radius:20px; padding:22px 20px; box-shadow:0 3px 20px rgba(0,0,0,.08); margin-bottom:12px; }

    /* Title */
    .title-icon { font-size:54px; text-align:center; margin-bottom:12px; }
    .title-card { text-align:center; }
    .title-card h2 { font-size:24px; font-weight:900; margin-bottom:6px; }
    .title-card .sub { color:#64748b; font-size:14px; line-height:1.7; margin-bottom:18px; }
    .name-input { width:100%; border:2px solid #e2e8f0; border-radius:12px; padding:13px 15px; font-size:17px; font-family:inherit; text-align:center; margin-bottom:14px; transition:border-color .2s; }
    .name-input:focus { outline:none; border-color:var(--purple); }
    .btn-row { display:flex; gap:10px; margin-bottom:12px; }
    .btn-create { flex:1; padding:14px 0; border:none; border-radius:14px; background:linear-gradient(135deg,#4263eb,#6c63ff); color:white; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; box-shadow:0 4px 14px rgba(66,99,235,.35); transition:transform .15s; }
    .btn-create:hover { transform:translateY(-2px); }
    .btn-join-open { flex:1; padding:14px 0; border:2px solid #e64980; border-radius:14px; background:white; color:#e64980; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; transition:background .15s; }
    .btn-join-open:hover { background:#fff0f6; }
    .join-area { display:none; }
    .join-area.open { display:block; }
    .code-input { width:100%; border:2px solid #e2e8f0; border-radius:12px; padding:13px 15px; font-size:26px; font-family:monospace; text-align:center; letter-spacing:.22em; margin-bottom:10px; transition:border-color .2s; }
    .code-input:focus { outline:none; border-color:#e64980; }
    .btn-do-join { width:100%; padding:14px 0; border:none; border-radius:14px; background:linear-gradient(135deg,#e64980,#f06595); color:white; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; }
    .error-msg { color:#e53e3e; font-size:14px; margin-top:8px; font-weight:600; min-height:20px; }

    /* Waiting */
    .room-code-display { background:linear-gradient(135deg,#1e1b4b,#4338ca); border-radius:16px; padding:20px; text-align:center; margin-bottom:14px; color:white; }
    .code-label { font-size:12px; font-weight:700; opacity:.75; margin-bottom:6px; letter-spacing:.08em; }
    .code-num { font-size:42px; font-weight:900; letter-spacing:.22em; font-family:monospace; }
    .copy-btn { margin-top:10px; background:rgba(255,255,255,.2); border:none; border-radius:8px; color:white; padding:7px 16px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
    .copy-btn:hover { background:rgba(255,255,255,.3); }
    .players-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
    .player-slot { border-radius:12px; padding:11px 10px; text-align:center; border:2px dashed #e2e8f0; background:#f8fafc; }
    .player-slot.filled { border-style:solid; }
    .slot-num { font-size:11px; font-weight:800; color:#94a3b8; margin-bottom:3px; }
    .slot-name { font-size:14px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .slot-empty { font-size:13px; color:#cbd5e1; }
    .slot-host-badge { font-size:10px; background:rgba(0,0,0,.08); border-radius:4px; padding:1px 5px; margin-top:2px; display:inline-block; }
    .start-btn { width:100%; padding:15px; border:none; border-radius:14px; background:linear-gradient(135deg,#1e1b4b,#6c63ff); color:white; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; box-shadow:0 4px 14px rgba(30,27,75,.3); transition:transform .15s; }
    .start-btn:hover:not(:disabled) { transform:translateY(-2px); }
    .start-btn:disabled { opacity:.4; cursor:not-allowed; }
    .wait-hint { text-align:center; font-size:13px; color:#94a3b8; margin-top:10px; }

    /* Countdown */
    .countdown-screen { position:fixed; inset:0; background:linear-gradient(135deg,#1e1b4b,#4338ca); display:flex; align-items:center; justify-content:center; z-index:200; color:white; flex-direction:column; }
    .countdown-num { font-size:120px; font-weight:900; line-height:1; animation:pop .8s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes pop { from{transform:scale(.3);opacity:0;} to{transform:scale(1);opacity:1;} }

    /* Question */
    .live-rank { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px; }
    .rank-chip { flex-shrink:0; border-radius:10px; padding:7px 11px; font-size:13px; font-weight:800; white-space:nowrap; }
    .genre-badge { display:inline-flex; align-items:center; gap:5px; padding:5px 13px; border-radius:100px; font-size:13px; font-weight:700; margin-bottom:12px; }
    .genre-badge.love   { background:#fff0f6; color:#e64980; }
    .genre-badge.work   { background:#eff3ff; color:#4263eb; }
    .genre-badge.friend { background:#e6fcf5; color:#0ca678; }
    .scene-lbl { font-size:11px; font-weight:800; color:#94a3b8; letter-spacing:.1em; margin-bottom:6px; }
    .scene-txt { font-size:15px; color:#334155; line-height:1.65; margin-bottom:15px; padding-bottom:15px; border-bottom:1px dashed #e2e8f0; }
    .prob-box { background:#fff5f5; border-left:4px solid #fc8181; border-radius:0 12px 12px 0; padding:11px 14px; margin-bottom:10px; }
    .prob-lbl { font-size:11px; font-weight:800; color:#e53e3e; margin-bottom:4px; }
    .prob-phrase { font-size:20px; font-weight:800; color:#c53030; }
    .why-bad { background:#fffbeb; border-radius:12px; padding:10px 14px; font-size:13px; color:#92400e; line-height:1.6; }
    .submit-count { text-align:center; background:#f0f4ff; border-radius:12px; padding:12px; margin-bottom:12px; }
    .submit-count .sc-num { font-size:22px; font-weight:900; color:#4263eb; }
    .submit-count .sc-label { font-size:13px; color:#4263eb; font-weight:600; }
    .ans-lbl { font-size:14px; font-weight:700; color:#334155; margin-bottom:8px; }
    textarea.ans-input { width:100%; border:2px solid #e2e8f0; border-radius:12px; padding:12px 14px; font-size:16px; font-family:inherit; resize:vertical; min-height:85px; line-height:1.65; transition:border-color .2s; }
    textarea.ans-input:focus { outline:none; border-color:var(--purple); }
    textarea.ans-input:disabled { background:#f8fafc; color:#94a3b8; }
    .char-hint { font-size:12px; color:#94a3b8; text-align:right; margin:4px 0 12px; }
    .submit-btn { width:100%; padding:15px; border:none; border-radius:14px; background:linear-gradient(135deg,var(--purple),#a855f7); color:white; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; box-shadow:0 4px 14px rgba(108,99,255,.36); transition:transform .15s; }
    .submit-btn:hover:not(:disabled) { transform:translateY(-2px); }
    .submit-btn:disabled { opacity:.4; cursor:not-allowed; }
    .submitted-msg { text-align:center; background:#f0fff4; border-radius:12px; padding:16px; }
    .submitted-msg .sm-icon { font-size:28px; margin-bottom:4px; }
    .submitted-msg .sm-txt { font-size:14px; color:#276749; font-weight:700; }
    .shortcut-hint { font-size:12px; color:#cbd5e1; text-align:center; margin-top:7px; }

    /* Reveal */
    .reveal-prob { background:#fff5f5; border-left:4px solid #fc8181; border-radius:0 12px 12px 0; padding:10px 14px; margin-bottom:14px; }
    .reveal-prob .rp-lbl { font-size:11px; font-weight:800; color:#e53e3e; margin-bottom:3px; }
    .reveal-prob .rp-phrase { font-size:16px; font-weight:800; color:#c53030; }
    .ranking-list { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
    .rank-card { border-radius:16px; padding:14px 15px; border:2px solid transparent; position:relative; }
    .rank-card .medal { font-size:22px; position:absolute; top:12px; right:14px; }
    .rank-card .rc-rank { font-size:11px; font-weight:800; color:#94a3b8; margin-bottom:3px; }
    .rc-name { font-size:15px; font-weight:800; margin-bottom:5px; }
    .rc-text { font-size:14px; color:#334155; line-height:1.5; margin-bottom:10px; font-style:italic; }
    .rc-score-row { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    .rc-score-num { font-size:36px; font-weight:900; line-height:1; }
    .rc-diagnosis { font-size:12px; color:#64748b; line-height:1.55; flex:1; }

    /* Counter-argument */
    .rebut-section { margin-top:10px; border-top:1px solid #f1f5f9; padding-top:12px; }
    .rebut-toggle { width:100%; padding:10px; border:2px solid #e2e8f0; border-radius:12px; background:white; font-size:13px; font-weight:700; color:#64748b; cursor:pointer; font-family:inherit; transition:all .2s; }
    .rebut-toggle:hover { border-color:var(--purple); color:var(--purple); }
    .rebut-area { display:none; margin-top:10px; }
    .rebut-area.open { display:block; }
    .rebut-label { font-size:13px; font-weight:700; color:#334155; margin-bottom:6px; }
    .rebut-hint { font-size:12px; color:#94a3b8; line-height:1.6; margin-bottom:8px; }
    textarea.rebut-input { width:100%; border:2px solid #e2e8f0; border-radius:12px; padding:11px 13px; font-size:14px; font-family:inherit; resize:vertical; min-height:75px; line-height:1.65; transition:border-color .2s; }
    textarea.rebut-input:focus { outline:none; border-color:var(--purple); }
    .rebut-submit { width:100%; margin-top:8px; padding:12px; border:none; border-radius:12px; background:linear-gradient(135deg,#334155,#475569); color:white; font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; }
    .rebut-result { margin-top:10px; background:#f8fafc; border-radius:12px; padding:13px 15px; font-size:13px; line-height:1.7; color:#334155; border-left:4px solid #6c63ff; }
    .rr-adj { font-size:16px; font-weight:900; margin-bottom:4px; }
    .rr-adj.pos { color:#276749; }
    .rr-adj.neg { color:#94a3b8; }

    /* Model answers */
    .model-section { margin-top:14px; padding-top:14px; border-top:1px solid #f1f5f9; }
    .model-title { font-size:13px; font-weight:800; color:#334155; margin-bottom:9px; }
    .model-item { background:linear-gradient(135deg,#f5f3ff,#ede9fe); border-radius:12px; padding:11px 14px; margin-bottom:8px; }
    .model-text { font-size:15px; font-weight:800; color:#4c1d95; margin-bottom:4px; }
    .model-reason { font-size:12px; color:#6d28d9; line-height:1.6; }
    .next-area { text-align:center; margin-top:18px; }
    .next-btn { background:linear-gradient(135deg,#1e1b4b,#4338ca); color:white; border:none; border-radius:14px; padding:15px 36px; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; box-shadow:0 4px 14px rgba(30,27,75,.3); transition:transform .15s; }
    .next-btn:hover { transform:translateY(-2px); }
    .guest-wait { font-size:14px; color:#94a3b8; font-weight:600; }

    /* Results */
    .final-rank-item { display:flex; align-items:center; gap:12px; padding:13px 15px; border-radius:14px; margin-bottom:8px; }
    .fri-medal { font-size:28px; flex-shrink:0; }
    .fri-info { flex:1; }
    .fri-name { font-size:16px; font-weight:800; }
    .fri-sub { font-size:12px; color:#64748b; margin-top:1px; }
    .fri-score { font-size:28px; font-weight:900; }
    .fri-sfx { font-size:13px; color:#94a3b8; }
    .bd-title { font-size:13px; font-weight:800; color:#334155; margin-bottom:10px; margin-top:16px; }
    .bd-q { padding:10px 0; border-bottom:1px solid #f1f5f9; }
    .bd-q-label { font-size:12px; color:#94a3b8; font-weight:700; margin-bottom:4px; }
    .bd-q-scene { font-size:13px; color:#334155; margin-bottom:6px; }
    .bd-scores { display:flex; flex-wrap:wrap; gap:6px; }
    .bd-chip { font-size:13px; font-weight:800; padding:4px 10px; border-radius:8px; }
    .rematch-btn { width:100%; padding:16px; margin-top:18px; border:none; border-radius:14px; background:linear-gradient(135deg,#1e1b4b,#6c63ff); color:white; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
    .anim { animation:fadeUp .35s ease forwards; }

    /* 称号 */
    .title-section { margin-top:18px; }
    .title-section-header { font-size:13px; font-weight:800; color:#94a3b8; letter-spacing:.06em; margin-bottom:10px; }
    .title-item { display:flex; align-items:center; gap:12px; background:#f8fafc; border-radius:14px; padding:12px 14px; margin-bottom:8px; }
    .title-badge { font-size:26px; flex-shrink:0; }
    .title-info { flex:1; }
    .title-name { font-size:15px; font-weight:900; color:#1e1b4b; }
    .title-holder { font-size:13px; color:#64748b; font-weight:700; margin-top:1px; }
    .title-reason { font-size:12px; color:#94a3b8; margin-top:2px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <h1>🔥 言い方バトル</h1>
    <span class="room-badge" id="header-room"></span>
  </div>
  <div class="prog-wrap" id="prog-wrap">
    <div class="prog-bar" id="prog-bar" style="width:0%"></div>
  </div>
</div>

<div class="main">
  <div class="screen active" id="screen-title">
    <div class="card title-card anim" style="margin-top:12px;">
      <div class="title-icon">🔥</div>
      <h2>言い方バトル</h2>
      <p class="sub">最大6人で同じ問題に答えて、お互いの「言い方」を比べよう。<br>5問ランダム出題・AI採点・反論あり。</p>
      <input type="text" class="name-input" id="my-name" placeholder="あなたの名前を入力" maxlength="10">
      <div class="btn-row">
        <button class="btn-create" onclick="goCreate()">ルームを作る</button>
        <button class="btn-join-open" onclick="toggleJoin()">ルームに参加</button>
      </div>
      <div class="join-area" id="join-area">
        <input type="text" class="code-input" id="room-code-input" placeholder="123456" maxlength="6" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')">
        <button class="btn-do-join" onclick="doJoin()">参加する →</button>
        <div class="error-msg" id="join-error"></div>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-waiting"><div id="waiting-content"></div></div>
  <div class="screen" id="screen-question"><div id="question-content"></div></div>
  <div class="screen" id="screen-reveal"><div id="reveal-content"></div></div>
  <div class="screen" id="screen-results"><div id="results-content"></div></div>
</div>

<div class="countdown-screen" id="countdown-overlay" style="display:none;">
  <div class="countdown-num" id="countdown-num">3</div>
  <div style="font-size:20px;font-weight:700;margin-top:12px;opacity:.8;">準備して！</div>
</div>

<script>
// ════════════════════════════════════════
// ★ FIREBASE CONFIG ★
// ════════════════════════════════════════
const FIREBASE_CONFIG = {

  authDomain:        "iikata1.firebaseapp.com",

  projectId:         "iikata1",
  storageBucket:     "iikata1.firebasestorage.app",
  messagingSenderId: "403587313012",
  appId:             "1:403587313012:web:d6ae0e70f6ab03dc4b5021"
};

// ════════════════════════════════════════
// PROBLEMS
// ════════════════════════════════════════
const QUESTIONS = [
  { id:0, genre:"love", genreLabel:"💕 恋愛・デート", scene:"相手がデートのお店を提案してきた", problematic:"いいよ、そこで", whyBad:"上から許可した感じ。相手の提案を受け入れているのに、恩を着せているように聞こえる", avoidWords:["いいよ"], goodWords:["いいね","楽しみ","行きたい","ありがとう","嬉しい","そこ行","気になってた","行こう"], modelAnswers:[{text:"そこ気になってたんだよね！ありがとう",reason:"「気になってた」で提案センスを肯定。感謝を添えることで受け入れる喜びが伝わる"},{text:"いいね！楽しみにしてるね",reason:"「いいね！」で即肯定。「楽しみ」で感情も素直に表現"}] },
  { id:1, genre:"love", genreLabel:"💕 恋愛・デート", scene:"相手が料理を作ってくれた", problematic:"まあ、悪くないね", whyBad:"褒めているつもりでも上から採点している。素直に喜べていない", avoidWords:["まあ","悪くない"], goodWords:["おいしい","美味しい","うまい","ありがとう","すごい","嬉しい","幸せ","最高","好き"], modelAnswers:[{text:"美味しい！こんなに作れるなんて知らなかった",reason:"「美味しい」と即座に率直に伝える。驚きで努力を見ていることが伝わる"},{text:"これ好きな味だ。ありがとうね",reason:"「好きな味」という個人的感想は「悪くない」より格段に喜びが伝わる"}] },
  { id:2, genre:"love", genreLabel:"💕 恋愛・デート", scene:"相手が「最近忙しそうだね」と心配してくれた", problematic:"別に大丈夫だから、心配しなくていいよ", whyBad:"相手の気遣いを跳ね返している。心配してくれた気持ちへの反応がゼロ", avoidWords:["別に","心配しなくていい","心配しなくて"], goodWords:["ありがとう","嬉しい","気にかけて","心配して","気づいて","救われ","助か"], modelAnswers:[{text:"心配してくれてありがとう。気づいてもらえて嬉しい",reason:"まず感謝。「気づいてもらえた」で相手の気遣いを肯定"},{text:"ありがとう。ちょっとバタバタしてるけど、気にかけてくれて救われる",reason:"状況を少し開示しつつ感謝を具体的に表現"}] },

const PLAYER_COLORS = ["#4263eb","#e64980","#0ca678","#e67700","#7950f2","#1098ad"];
const MEDALS = ["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣"];
const Q_COUNT = 5;

// ════════════════════════════════════════
// SCORING ENGINE
// ════════════════════════════════════════
function scoreAnswer(qIdx, raw) {
  const q = QUESTIONS[qIdx], ans = raw.trim();
  if (!ans) return null;
  if (ans.length <= 2) {
    const s = Math.floor(Math.random()*8)+3;
    return { score:s, grade:"low", diagnosis:`${s}点。短すぎる。言い方を考えた形跡がない。`, improved:[], lacking:["回答が短すぎる"] };
  }
  if (ans === q.problematic) return { score:0, grade:"low", diagnosis:`0点。同じセリフそのまま。練習になっていない。`, improved:[], lacking:["問題のセリフをそのまま使っている"] };

  let score = 52;
  const improved = [], lacking = [];

  if (ans.length < 5) { score -= 18; lacking.push("短すぎる。言い方を考えた形跡がない"); }
  else if (ans.length >= 30) { score += 11; improved.push("言葉を丁寧に選んでいる"); }
  else if (ans.length >= 15) { score += 6; }

  let badCount = 0;
  for (const w of q.avoidWords) { if (ans.includes(w)) { score -= 17; badCount++; } }
  if (badCount === 0 && q.avoidWords.length > 0) { score += 12; improved.push("問題の言い回しを排除できている"); }
  else if (badCount > 0) lacking.push("まだ問題のある言い回しが残っている");

  let gc = 0;
  for (const w of q.goodWords) { if (ans.includes(w)) gc++; }
  if (gc >= 3)      { score += 18; improved.push("相手への配慮が複数の言葉に表れている"); }
  else if (gc === 2) { score += 12; improved.push("相手への配慮が言葉に表れている"); }
  else if (gc === 1) { score += 6;  improved.push("改善の方向性は合っている"); lacking.push("もう一歩、相手への言及があると良い"); }
  else               { score -= 8;  lacking.push("相手への共感・感謝の言葉が足りない"); }

  if (ans.includes("ありがとう")) { score += 8; if (!improved.some(s=>s.includes("感謝")||s.includes("配慮"))) improved.push("感謝の気持ちをちゃんと言葉にしている"); }
  if (ans.includes("ます") || ans.includes("です")) score += 3;
  if ([7,8,9].includes(qIdx) && (ans.includes("？")||ans.includes("?"))) { score += 7; improved.push("相手への問いかけができている"); }

  score = Math.round(Math.max(5, Math.min(97, score)));
  const grade = score >= 80 ? "high" : score >= 60 ? "mid" : "low";
  if (improved.length === 0) improved.push("改善しようとする意図は見える");
  if (lacking.length === 0 && score < 88) lacking.push("細かい言葉選びを磨くと、さらに伝わりやすくなる");

  const pools = {
    low:   [`${score}点。問題の本質がまだ掴めていない。`, `${score}点。言葉を変えようとしているが、相手の受け取り方は変わっていない。`],
    below: [`${score}点。方向性はあっているが、まだ引っかかりが残る。`, `${score}点。惜しい。あと一歩で大きく変わる。`],
    mid:   [`${score}点。悪くない。相手への配慮をもう少し言葉に乗せると、グッと変わる。`, `${score}点。方向性は正しい。もう一押しで届く言い方になる。`],
    high:  [`${score}点。かなり良い。相手が受け取りやすい言い方だ。`, `${score}点。よくできている。感情が自然に伝わる言い方だ。`],
    great: [`${score}点。完璧に近い。相手が「言ってよかった」と思える言い方だ。`, `${score}点。素晴らしい。言葉選びも相手への気遣いも高水準にある。`]
  };
  const key = score < 35 ? "low" : score < 55 ? "below" : score < 70 ? "mid" : score < 85 ? "high" : "great";
  return { score, grade, diagnosis: pools[key][Math.floor(Math.random()*2)], improved: improved.slice(0,3), lacking: lacking.slice(0,3) };
}

// ════════════════════════════════════════
// COUNTER-ARGUMENT ENGINE
// ════════════════════════════════════════
function evaluateRebut(text) {
  const t = text.trim();
  if (t.length < 10) return { adj:0, response:"反論が短すぎる。もう少し具体的に説明してほしい。" };

  let adj = 0;
  const reasons = [];
  if (/関係|親し|距離感|仲|付き合い|相手のこと/.test(t)) { adj += 7; reasons.push("関係性の文脈を踏まえた指摘"); }
  if (/場合|シーン|状況|場の空気|緊急|急|このとき/.test(t)) { adj += 5; reasons.push("状況的な判断"); }
  if (/文化|習慣|方言|地域|日本語|ニュアンス/.test(t)) { adj += 5; reasons.push("文化・言語的な観点"); }
  if (/なぜなら|だから|ため|理由|思う理由|と考え/.test(t)) { adj += 4; reasons.push("論理的な説明"); }
  if (t.length >= 60)  adj += 4;
  if (t.length >= 120) adj += 3;
  adj = Math.min(adj, 15);

  let response = "";
  if (adj >= 12) response = `たしかに、${reasons.join("・")}という点は認めよう。その文脈を加味すると評価を見直す余地がある。ただし、相手の受け取り方の問題は依然として残る。`;
  else if (adj >= 7) response = `一理ある。${reasons.length > 0 ? reasons[0]+'という視点は' : 'その指摘は'}評価できる。ただし、それだけで問題が完全に解消されるとは言い難い。`;
  else if (adj >= 3) response = `弱い反論だ。言いたいことはわからなくもないが、相手の気持ちの視点が欠けている。もう少し掘り下げてほしい。`;
  else response = `その反論は認められない。主張に具体性がなく、なぜその言い方が適切なのかの説明になっていない。`;

  return { adj, response };
}

function checkReconnect() {
  const saved = sessionStorage.getItem('battleRoom');
  if (!saved) return;
  try {
    const { roomId: rId, myName: rName } = JSON.parse(saved);
    db.ref(`rooms/${rId}`).get().then(snap => {
      if (!snap.exists()) { sessionStorage.removeItem('battleRoom'); return; }
      const room = snap.val();
      if (room.state === 'finished') { sessionStorage.removeItem('battleRoom'); return; }
      if (!room.players?.[myPlayerId]) { sessionStorage.removeItem('battleRoom'); return; }
      roomId = rId; myName = rName;
      myRole = room.host === myPlayerId ? 'host' : 'player';
      selectedQs = room.selectedQs || [];
      document.getElementById('my-name').value = myName;
      setRoomBadge(roomId);
      listenToRoom();
    });
  } catch(e) { sessionStorage.removeItem('battleRoom'); }
}

  const n = getMyName(); if (!n) return;

  if (code.length !== 6) { document.getElementById('join-error').textContent='6桁のコードを入力してください'; return; }

  const room = snap.val();

// ════════════════════════════════════════
// ROOM LISTENER
// ════════════════════════════════════════
function listenToRoom() {
  if (roomRef) roomRef.off();
  roomRef = db.ref(`rooms/${roomId}`);
  roomRef.on('value', snap => {
    const room = snap.val(); if (!room) return;
    if (room.selectedQs) selectedQs = room.selectedQs;
    if (room.host === myPlayerId) myRole = 'host';
    handleRoomUpdate(room);
  });
}

function handleRoomUpdate(room) {
  const state = room.state;
  const isHost = room.host === myPlayerId;

  if (state === 'waiting') {
    renderWaiting(room);
    if (!document.getElementById('screen-waiting').classList.contains('active')) showScreen('screen-waiting');
    return;
  }
  if (state === 'starting') {
    showCountdown().then(()=>{ if (isHost) db.ref(`rooms/${roomId}/state`).set('q0_answering'); });
    return;
  }

  const ansM = state.match(/^q(\d+)_answering$/);
  const revM = state.match(/^q(\d+)_revealing$/);

  if (ansM) {
    const qi = parseInt(ansM[1]);
    setProgress(qi, Q_COUNT);
    renderQuestion(room, qi);
    if (!document.getElementById('screen-question').classList.contains('active')) showScreen('screen-question');
    if (isHost && checkAllAnswered(room, qi)) {
      setTimeout(()=>db.ref(`rooms/${roomId}/state`).set(`q${qi}_revealing`), 600);
    }
    return;
  }
  if (revM) {
    const qi = parseInt(revM[1]);
    setProgress(qi+1, Q_COUNT);
    renderReveal(room, qi);
    if (!document.getElementById('screen-reveal').classList.contains('active')) showScreen('screen-reveal');
    return;
  }
  if (state === 'finished') {
    renderResults(room); showScreen('screen-results'); sessionStorage.removeItem('battleRoom');
  }
}

function checkAllAnswered(room, qi) {
  const pids = Object.keys(room.players||{});
  const ans  = room.answers?.[qi]||{};
  return pids.every(pid => ans[pid]?.submitted);
}

function showCountdown() {

// ════════════════════════════════════════
// QUESTION
// ════════════════════════════════════════
function renderQuestion(room, qi) {
  const qIdx  = selectedQs[qi];
  const q     = QUESTIONS[qIdx];
  const pids  = Object.keys(room.players||{});
  const myAns = room.answers?.[qi]?.[myPlayerId];
  const submitted = pids.filter(pid => room.answers?.[qi]?.[pid]?.submitted);

  // Running totals for live rank
  const totals = pids.map(pid=>{
    let t=0; for(let i=0;i<qi;i++) t+=(room.answers?.[i]?.[pid]?.score||0)+(room.answers?.[i]?.[pid]?.rebutAdj||0);
    return {pid, name:room.players[pid].name, total:t};
  }).sort((a,b)=>b.total-a.total);
  const rankChips = qi > 0 ? totals.map((p,i)=>`<div class="rank-chip" style="background:${playerColor(pids.indexOf(p.pid))}22;color:${playerColor(pids.indexOf(p.pid))}">${MEDALS[i]} ${p.name} ${p.total}pt</div>`).join('') : '';

  document.getElementById('question-content').innerHTML = `
    <div class="anim">
      ${qi>0?`<div class="live-rank">${rankChips}</div>`:''}
      <div class="genre-badge ${q.genre}">${q.genreLabel}</div>
      <div class="card">
        <div class="scene-lbl">シーン（問${qi+1}/${Q_COUNT}）</div>
        <div class="scene-txt">${q.scene}</div>
        <div class="prob-box"><div class="prob-lbl">❌ 問題のある言い方</div><div class="prob-phrase">「${q.problematic}」</div></div>
        <div class="why-bad">⚠️ ${q.whyBad}</div>
      </div>
      <div class="card">
        <div class="submit-count">
          <div class="sc-num">${submitted.length}<span style="font-size:16px;font-weight:600;color:#94a3b8"> / ${pids.length}人</span></div>
          <div class="sc-label">が回答済み</div>
        </div>
        ${myAns?.submitted
          ? `<div class="submitted-msg">
               <div class="sm-icon">${submitted.length===pids.length?'✅':'⏳'}</div>
               <div class="sm-txt">${submitted.length===pids.length?'全員が回答しました！':'あなたの回答は送信済み。他の人を待っています...'}</div>
             </div>`
          : `<div class="ans-lbl">✏️ あなたの改善版を書いてください</div>
             <textarea class="ans-input" id="my-answer-input" placeholder="「${q.problematic}」の代わりに何と言いますか？" oninput="updateChar(this)"></textarea>
             <div class="char-hint" id="char-hint">0文字</div>
             <button class="submit-btn" id="submit-btn" onclick="submitAnswer(${qi})">採点する →</button>
             <div class="shortcut-hint">Ctrl+Enter でも送信</div>`}
      </div>
    </div>`;

  if (!myAns?.submitted) {
    setTimeout(()=>{
      const ta=document.getElementById('my-answer-input'); if(!ta) return;
      ta.focus();
      ta.addEventListener('keydown', e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='Enter') submitAnswer(qi); });
    }, 80);
  }
}
function updateChar(el) { const h=document.getElementById('char-hint'); if(h) h.textContent=el.value.length+'文字'; }

async function submitAnswer(qi) {
  const ta=document.getElementById('my-answer-input'), btn=document.getElementById('submit-btn');
  if (!ta) return;
  const ans=ta.value.trim(); if(!ans){ta.style.borderColor='#fc8181';return;}
  ta.disabled=true; if(btn) btn.disabled=true;
  const qIdx=selectedQs[qi];
  const result=scoreAnswer(qIdx, ans);
  await db.ref(`rooms/${roomId}/answers/${qi}/${myPlayerId}`).set({
    text:ans, score:result.score, grade:result.grade, diagnosis:result.diagnosis,
    improved:result.improved, lacking:result.lacking, submitted:true, rebutAdj:0
  });
  const snap=await db.ref(`rooms/${roomId}`).get();
  if (snap.exists()) renderQuestion(snap.val(), qi);
}

function renderReveal(room, qi) {
  const qIdx   = selectedQs[qi];

  const pids   = Object.keys(room.players||{});
  const isHost = room.host === myPlayerId;

  const ranked = pids.map(pid=>{

    return { pid, name:room.players[pid].name, colorIdx:pids.indexOf(pid), ...a, adj:a.rebutAdj||0 };
  }).sort((a,b)=>(b.score+b.adj)-(a.score+a.adj));

  const rankCards = ranked.map((p,rank)=>{
    const color    = playerColor(p.colorIdx);
    const isMe     = p.pid === myPlayerId;
    const finalScore = p.score+(p.adj||0);
    return `
      <div class="rank-card" id="rc-${p.pid}" style="background:${color}12;border-color:${color}${rank===0?';box-shadow:0 0 0 3px gold':''}">

        <div class="rc-score-row">
          <div>
            <span class="rc-score-num" id="rscore-${p.pid}" style="color:${color}">0</span>
            <span style="font-size:13px;color:#94a3b8;font-weight:700">点${p.adj>0?` (+${p.adj}加点)`:''}</span>
          </div>
          <div class="rc-diagnosis">${p.diagnosis}</div>
        </div>
        <div class="rebut-section">
          ${p.rebutSubmitted ? `
          <div class="rebut-result">
            <div class="rr-adj ${(p.rebutAdj||0)>0?'pos':'neg'}">${(p.rebutAdj||0)>0?`+${p.rebutAdj}点の加点！`:'加点なし'}</div>
            <div>💬 反論：${p.rebutResponse||''}</div>
          </div>` : isMe ? `
          <button class="rebut-toggle" id="rtoggle-${p.pid}" onclick="toggleRebut('${p.pid}')">💬 この採点に反論する</button>
          <div class="rebut-area" id="rebut-area-${p.pid}">
            <div class="rebut-label" style="margin-top:10px;">なぜその言い方が正しいと思う？</div>
            <div class="rebut-hint">関係性・場の状況・文化的背景など、具体的な理由を書くほど評価されやすい。（最大+15点）</div>
            <textarea class="rebut-input" id="rebut-input-${p.pid}" placeholder="例：この二人は長い付き合いなので、簡潔な言い方の方が自然で..."></textarea>
            <button class="rebut-submit" id="rsubmit-${p.pid}" onclick="submitRebut('${p.pid}',${qi})">反論を送る</button>
          </div>` : ''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('reveal-content').innerHTML = `
    <div class="anim">
      <div class="card">
        <div style="font-size:13px;font-weight:800;color:#94a3b8;margin-bottom:8px;">問${qi+1}/${Q_COUNT} 結果発表</div>
        <div class="genre-badge ${q.genre}">${q.genreLabel}</div>
        <div class="reveal-prob">
          <div class="rp-lbl">❌ 問題のセリフ</div>
          <div class="rp-phrase">「${q.problematic}」</div>
        </div>
        <div class="ranking-list">${rankCards}</div>
        <div class="model-section">
          <div class="model-title">💡 模範解答例</div>
          ${q.modelAnswers.map(m=>`<div class="model-item"><div class="model-text">「${m.text}」</div><div class="model-reason">→ ${m.reason}</div></div>`).join('')}
        </div>
        <div class="next-area">
          ${isHost
            ? `<button class="next-btn" onclick="nextQuestion(${qi})">${isLast?'最終結果を見る 🎉':'次の問題へ →'}</button>`
            : `<div class="guest-wait">⏳ ホストが次の問題に進めます...</div>`}
        </div>
      </div>
    </div>`;

  setTimeout(()=>{ ranked.forEach(p=>animCount(`rscore-${p.pid}`, p.score+(p.adj||0))); }, 200);
}

function toggleRebut(pid) {
  const area = document.getElementById(`rebut-area-${pid}`);
  area.classList.toggle('open');
  if (area.classList.contains('open')) setTimeout(()=>document.getElementById(`rebut-input-${pid}`)?.focus(), 100);
}

async function submitRebut(pid, qi) {
  const ta = document.getElementById(`rebut-input-${pid}`); if (!ta) return;
  const text = ta.value.trim(); if (!text) { ta.style.borderColor='#fc8181'; return; }
  const snap = await db.ref(`rooms/${roomId}/answers/${qi}/${pid}`).get();
  if (snap.val()?.rebutSubmitted) {
    document.getElementById(`rebut-result-${pid}`).innerHTML=`<div class="rebut-result">反論はすでに送信済みです。</div>`; return;
  }
  const origScore = snap.val()?.score || 0;
  const { adj, response } = evaluateRebut(text);
  await db.ref(`rooms/${roomId}/answers/${qi}/${pid}`).update({ rebutAdj:adj, rebutSubmitted:true, rebutResponse:response });
  document.getElementById(`rebut-result-${pid}`).innerHTML = `
    <div class="rebut-result">
      <div class="rr-adj ${adj>0?'pos':'neg'}">${adj>0?`+${adj}点の加点！`:'加点なし'}</div>
      <div>AIの判定：${response}</div>
    </div>`;
  ta.disabled=true;
  const rsBtn=document.getElementById(`rsubmit-${pid}`); if(rsBtn) rsBtn.disabled=true;
  const rtBtn=document.getElementById(`rtoggle-${pid}`); if(rtBtn) rtBtn.textContent='💬 反論済み';
  animCount(`rscore-${pid}`, origScore+adj);
}

async function nextQuestion(qi) {
  if (myRole !== 'host') return;
  const next = qi+1;
  if (next >= Q_COUNT) await db.ref(`rooms/${roomId}/state`).set('finished');
  else                  await db.ref(`rooms/${roomId}/state`).set(`q${next}_answering`);
}

// ════════════════════════════════════════
// RESULTS
// ════════════════════════════════════════
function renderResults(room) {
  const pids = Object.keys(room.players||{});
  const totals = pids.map(pid=>{
    let t=0;
    for (let i=0;i<Q_COUNT;i++) { const a=room.answers?.[i]?.[pid]||{}; t+=(a.score||0)+(a.rebutAdj||0); }
    return { pid, name:room.players[pid].name, total:t, colorIdx:pids.indexOf(pid) };
  }).sort((a,b)=>b.total-a.total);

  const podium = totals.map((p,i)=>{
    const color = playerColor(p.colorIdx);
    const isMe  = p.pid === myPlayerId;
    return `<div class="final-rank-item" style="background:${color}${i===0?'2a':'18'};${i===0?'border:2px solid gold':''}">
      <div class="fri-medal">${MEDALS[i]}</div>
      <div class="fri-info">
        <div class="fri-name" style="color:${color}">${p.name}${isMe?' 👈':''}</div>
        <div class="fri-sub">${['優勝！🎉','準優勝','3位'][i]||''}</div>
      </div>
      <div><span class="fri-score" id="fscore-${p.pid}" style="color:${color}">0</span><span class="fri-sfx">点</span></div>
    </div>`;
  }).join('');

  const breakdown = Array.from({length:Q_COUNT}, (_,qi)=>{
    const qIdx=selectedQs[qi], q=QUESTIONS[qIdx];
    const scores=pids.map(pid=>{ const a=room.answers?.[qi]?.[pid]||{}; return {pid,name:room.players[pid].name,score:(a.score||0)+(a.rebutAdj||0),colorIdx:pids.indexOf(pid)}; }).sort((a,b)=>b.score-a.score);
    const chips=scores.map(s=>`<div class="bd-chip" style="background:${playerColor(s.colorIdx)}20;color:${playerColor(s.colorIdx)}">${s.name} ${s.score}点</div>`).join('');
    return `<div class="bd-q">
      <div class="bd-q-label">問${qi+1}｜${q.genreLabel}</div>
      <div class="bd-q-scene">${q.scene}</div>
      <div class="bd-scores">${chips}</div>
    </div>`;
  }).join('');

  // ── 称号システム ──
  const titleCards = assignTitles(room, pids, totals);

  document.getElementById('results-content').innerHTML = `
    <div class="card anim" style="margin-top:12px;">
      <div style="text-align:center;padding:16px 0 14px;">
        <div style="font-size:52px;margin-bottom:8px;">🏆</div>
        <div style="font-size:22px;font-weight:900;margin-bottom:4px;">${totals[0].name} の勝ち！</div>
        <div style="font-size:14px;color:#64748b;">全${Q_COUNT}問の勝負が終わりました</div>
      </div>
      <div>${podium}</div>
      <div class="title-section">
        <div class="title-section-header">✨ 今回の称号</div>
        ${titleCards}
      </div>
      <div class="bd-title" style="margin-top:18px;">問題別スコア</div>
      ${breakdown}
      <button class="rematch-btn" onclick="rematch()">🔄 もう一度やる</button>
    </div>`;

  setTimeout(()=>totals.forEach(p=>animCount(`fscore-${p.pid}`, p.total)), 300);
}

// ════════════════════════════════════════
// TITLE SYSTEM
// ════════════════════════════════════════
function assignTitles(room, pids, totals) {
  // 各プレイヤーのスタッツを計算
  const stats = pids.map(pid => {
    let scores = [], rebutCount = 0, rebutBonus = 0, gaveRebut = false;
    for (let i = 0; i < Q_COUNT; i++) {
      const a = room.answers?.[i]?.[pid] || {};
      scores.push(a.score || 0);
      if (a.rebutSubmitted) { rebutCount++; rebutBonus += (a.rebutAdj||0); }
    }
    const total = scores.reduce((s,v)=>s+v,0) + rebutBonus;
    const avg = total / Q_COUNT;
    const maxScore = Math.max(...scores);
    const minScore = Math.min(...scores);
    const variance = scores.reduce((s,v)=>s+Math.pow(v-avg,2),0) / Q_COUNT;
    return { pid, name: room.players[pid].name, scores, total, avg, maxScore, minScore, variance, rebutCount, rebutBonus };
  });

  const titles = [];
  const used = new Set(); // 同じプレイヤーに複数称号が重ならないよう管理

  function award(badge, name, reason, targetPid) {
    if (!used.has(targetPid)) {
      used.add(targetPid);
      const isMe = targetPid === myPlayerId;
      titles.push(`<div class="title-item">
        <div class="title-badge">${badge}</div>
        <div class="title-info">
          <div class="title-name">${name}</div>
          <div class="title-holder">${stats.find(s=>s.pid===targetPid).name}${isMe?' 👈 あなた':''}</div>
          <div class="title-reason">${reason}</div>
        </div>
      </div>`);
    }
  }

  // 1位：総合優勝
  award("🏆", "言い方の達人", "総合スコア1位。言葉選びが冴えてた", totals[0].pid);

  // 最高スコア問題（飛び抜けた回答があった人）
  const topScorer = [...stats].sort((a,b)=>b.maxScore-a.maxScore)[0];
  award("💎", "一問入魂", `1問で${topScorer.maxScore}点の神回答`, topScorer.pid);

  // 反論成功者（最も反論加点が高かった人）
  const rebutStar = [...stats].filter(s=>s.rebutCount>0).sort((a,b)=>b.rebutBonus-a.rebutBonus)[0];
  if (rebutStar) award("⚡", "反論の申し子", `反論で+${rebutStar.rebutBonus}点を勝ち取った`, rebutStar.pid);

  // 安定感（分散が最も小さい人）
  const stable = [...stats].sort((a,b)=>a.variance-b.variance)[0];
  award("🪨", "鉄壁の安定感", "ムラなく高得点をキープ", stable.pid);

  // 最下位
  const last = totals[totals.length-1];
  if (!used.has(last.pid)) {
    award("🌱", "今日から成長株", "今回は苦戦。でも気づきが一番多かったはず", last.pid);
  }

  // まだ称号のないプレイヤーに汎用称号
  const FALLBACK = [
    ["🌟","ダークホース","次回は表彰台を狙え"],
    ["🎯","センスの原石","言葉のセンスが光る瞬間があった"],
    ["🤝","場の空気読み","チーム全体を盛り上げてくれた"],
    ["💡","独創的な言い方","誰も思いつかない表現を出してきた"],
  ];
  let fi = 0;
  for (const p of totals) {
    if (!used.has(p.pid) && fi < FALLBACK.length) {
      award(FALLBACK[fi][0], FALLBACK[fi][1], FALLBACK[fi][2], p.pid);
      fi++;
    }
  }

  return titles.join('');
}

function rematch() {
  sessionStorage.removeItem('battleRoom');
  if (roomRef) roomRef.off();
  roomId=''; selectedQs=[];
  document.getElementById('prog-wrap').style.display='none';
  document.getElementById('header-room').style.display='none';
  document.getElementById('prog-bar').style.width='0%';
  showScreen('screen-title');
}
</script>
